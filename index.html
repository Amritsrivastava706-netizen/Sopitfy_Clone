<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spotify Clone</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --green: #1db954;
      --bg: #121212;
      --surface: #181818;
      --surface2: #282828;
      --surface3: #333333;
      --text: #ffffff;
      --text-muted: #b3b3b3;
      --player-h: 90px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      background: #000;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #222;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--green);
    }
    .nav-brand svg { width: 30px; height: 30px; fill: var(--green); }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    /* LAYOUT */
    .layout { display: flex; flex: 1; overflow: hidden; padding-bottom: var(--player-h); }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: #000;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-right: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 12px 12px 6px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .sidebar-item:hover { background: var(--surface2); color: #fff; }
    .sidebar-item.active { background: var(--surface2); color: #fff; }
    .sidebar-item i { width: 18px; text-align: center; }
    .pl-thumb {
      width: 38px; height: 38px; border-radius: 4px;
      background: var(--surface3);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: var(--text-muted); flex-shrink: 0;
    }

    /* MAIN */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      background: linear-gradient(180deg, #1a3a2a 0%, var(--bg) 320px);
    }
    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .page-header {
      display: flex;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: 32px;
    }
    .playlist-art {
      width: 190px; height: 190px;
      border-radius: 6px;
      background: linear-gradient(135deg, #1db954 0%, #065f2f 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      flex-shrink: 0;
    }
    .playlist-type { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    .playlist-title { font-size: 2.8rem; font-weight: 700; margin: 6px 0 10px; line-height: 1.1; }
    .playlist-desc { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 6px; }
    .playlist-stats { color: var(--text-muted); font-size: 0.82rem; }
    .playlist-stats span { color: #fff; font-weight: 600; }

    /* CONTROLS ROW */
    .controls-row { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .btn-play-big {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--green);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: #000;
      transition: transform 0.1s, background 0.2s;
    }
    .btn-play-big:hover { transform: scale(1.06); background: #1ed760; }
    .btn-icon {
      background: none; border: none;
      color: var(--text-muted); font-size: 1.4rem;
      cursor: pointer; transition: color 0.2s, transform 0.1s; padding: 4px;
    }
    .btn-icon:hover { color: #fff; }
    .btn-icon.active { color: var(--green); }

    /* SONG TABLE */
    .song-table-header {
      display: grid;
      grid-template-columns: 44px 1fr 140px 80px;
      padding: 0 16px 8px;
      border-bottom: 1px solid #333;
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .song-row {
      display: grid;
      grid-template-columns: 44px 1fr 140px 80px;
      align-items: center;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .song-row:hover { background: var(--surface2); }
    .song-row.active { background: rgba(29,185,84,0.1); }
    .song-row.active .song-title { color: var(--green); }

    .song-num {
      color: var(--text-muted);
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
    }
    .song-row:hover .num-text,
    .song-row.active:not(.playing) .num-text { display: none; }
    .song-row:hover .play-icon,
    .song-row.active:not(.playing) .play-icon { display: block; }
    .play-icon { display: none; color: #fff; font-size: 0.8rem; }

    .eq-bars { display: none; gap: 2px; align-items: flex-end; height: 14px; }
    .song-row.active.playing .eq-bars { display: flex; }
    .song-row.active.playing .num-text { display: none; }
    .song-row.active.playing .play-icon { display: none; }
    .eq-bar {
      width: 3px; background: var(--green); border-radius: 1px;
      animation: eq 0.8s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(1) { height: 40%; animation-delay: 0s; }
    .eq-bar:nth-child(2) { height: 80%; animation-delay: 0.2s; }
    .eq-bar:nth-child(3) { height: 55%; animation-delay: 0.1s; }
    .eq-bar:nth-child(4) { height: 100%; animation-delay: 0.3s; }
    @keyframes eq { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

    .song-info-cell { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .song-cover-placeholder {
      width: 40px; height: 40px; border-radius: 4px;
      background: linear-gradient(135deg, #1db954 0%, #065f2f 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .song-title {
      font-size: 0.92rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff;
    }
    .song-artist {
      font-size: 0.78rem; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-duration { color: var(--text-muted); font-size: 0.82rem; text-align: right; padding-right: 8px; }

    /* PLAYER */
    .player {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--player-h);
      background: #181818;
      border-top: 1px solid #2a2a2a;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      padding: 0 16px;
      z-index: 200;
    }
    .now-playing { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .np-cover {
      width: 54px; height: 54px; border-radius: 4px;
      background: linear-gradient(135deg, #1db954 0%, #065f2f 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .np-title {
      font-size: 0.82rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff;
    }
    .np-artist { font-size: 0.73rem; color: var(--text-muted); }
    .np-like {
      background: none; border: none;
      color: var(--text-muted); font-size: 1rem;
      cursor: pointer; transition: color 0.2s; flex-shrink: 0;
    }
    .np-like:hover { color: var(--green); }

    .player-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .player-btns { display: flex; align-items: center; gap: 16px; }
    .player-btn {
      background: none; border: none;
      color: var(--text-muted); font-size: 0.95rem;
      cursor: pointer; transition: color 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
    }
    .player-btn:hover { color: #fff; transform: scale(1.08); }
    .player-btn.active { color: var(--green); }
    .player-btn.main-play {
      width: 34px; height: 34px;
      border-radius: 50%; background: #fff; color: #000;
      font-size: 0.9rem;
    }
    .player-btn.main-play:hover { background: #eee; transform: scale(1.06); }

    .progress-row {
      display: flex; align-items: center; gap: 10px;
      width: 100%; max-width: 480px;
    }
    .time-label { font-size: 0.68rem; color: var(--text-muted); min-width: 34px; }
    .time-label.right { text-align: right; }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--surface3);
      outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%; background: #fff;
      cursor: pointer; opacity: 0; transition: opacity 0.15s;
    }
    input[type="range"]:hover::-webkit-slider-thumb { opacity: 1; }
    #progressBar { background: linear-gradient(to right, var(--green) var(--prog, 0%), var(--surface3) var(--prog, 0%)); }
    #volumeBar { width: 88px; background: linear-gradient(to right, var(--text-muted) var(--vol, 70%), var(--surface3) var(--vol, 70%)); }

    .player-right { display: flex; align-items: center; gap: 12px; justify-content: flex-end; }
    .vol-wrap { display: flex; align-items: center; gap: 8px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 106px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      color: #fff; padding: 9px 18px;
      border-radius: 40px; font-size: 0.82rem; font-weight: 500;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; z-index: 999;
      border: 1px solid #444;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 720px) {
      .sidebar { display: none; }
      .player { grid-template-columns: 1fr 2fr; }
      .player-right { display: none; }
      .playlist-title { font-size: 2rem; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    Spotify
  </div>
  <div class="nav-links">
    <a href="#" class="active">Home</a>
    <a href="#">Search</a>
    <a href="#">Library</a>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">Menu</div>
    <div class="sidebar-item active"><i class="fas fa-home"></i> Home</div>
    <div class="sidebar-item"><i class="fas fa-search"></i> Search</div>
    <div class="sidebar-item"><i class="fas fa-book"></i> Your Library</div>
    <div class="sidebar-label" style="margin-top:12px">Playlists</div>
    <div class="sidebar-item"><div class="pl-thumb">🎵</div> NCS Top Hits</div>
    <div class="sidebar-item"><div class="pl-thumb">❤️</div> Liked Songs</div>
    <div class="sidebar-item"><div class="pl-thumb">🔥</div> Trending Now</div>
    <div class="sidebar-item"><div class="pl-thumb">✨</div> Chill Vibes</div>
  </aside>

  <main>
    <div class="page-header">
      <div class="playlist-art">🎵</div>
      <div class="playlist-meta">
        <div class="playlist-type">Playlist</div>
        <h1 class="playlist-title">Best of NCS</h1>
        <p class="playlist-desc">No Copyright Sounds — the best royalty-free music.</p>
        <div class="playlist-stats"><span>7 songs</span> · about 26 minutes</div>
      </div>
    </div>

    <div class="controls-row">
      <button class="btn-play-big" id="bigPlayBtn"><i class="fas fa-play"></i></button>
      <button class="btn-icon" id="shuffleBtn" title="Shuffle"><i class="fas fa-random"></i></button>
      <button class="btn-icon" id="repeatBtn" title="Repeat"><i class="fas fa-redo"></i></button>
    </div>

    <div class="song-table-header">
      <div>#</div><div>Title</div><div>Artist</div>
      <div style="text-align:right;padding-right:8px"><i class="fas fa-clock"></i></div>
    </div>
    <div id="songList"></div>
  </main>
</div>

<div class="player">
  <div class="now-playing">
    <div class="np-cover" id="npCover">🎵</div>
    <div class="np-info">
      <div class="np-title" id="npTitle">Select a song</div>
      <div class="np-artist" id="npArtist">—</div>
    </div>
    <button class="np-like" id="likeBtn"><i class="far fa-heart"></i></button>
  </div>

  <div class="player-center">
    <div class="player-btns">
      <button class="player-btn" id="shuffleBtnP"><i class="fas fa-random"></i></button>
      <button class="player-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
      <button class="player-btn main-play" id="masterPlay"><i class="fas fa-play"></i></button>
      <button class="player-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
      <button class="player-btn" id="repeatBtnP"><i class="fas fa-redo"></i></button>
    </div>
    <div class="progress-row">
      <span class="time-label" id="currentTime">0:00</span>
      <input type="range" id="progressBar" min="0" max="100" value="0"/>
      <span class="time-label right" id="duration">0:00</span>
    </div>
  </div>

  <div class="player-right">
    <div class="vol-wrap">
      <button class="player-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
      <input type="range" id="volumeBar" min="0" max="100" value="70"/>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const songs = [
  { title: "Let Me Love You",   artist: "DJ Snake",          file: "song/1.mp3", duration: "3:34", emoji: "💚" },
  { title: "Closer",            artist: "The Chainsmokers",  file: "song/2.mp3", duration: "4:05", emoji: "🔥" },
  { title: "Faded",             artist: "Alan Walker",       file: "song/3.mp3", duration: "3:32", emoji: "🌊" },
  { title: "Spectre",           artist: "Alan Walker",       file: "song/4.mp3", duration: "3:46", emoji: "⚡" },
  { title: "Alone",             artist: "Alan Walker",       file: "song/5.mp3", duration: "2:41", emoji: "🎶" },
  { title: "Darkside",          artist: "Alan Walker",       file: "song/6.mp3", duration: "3:46", emoji: "🌑" },
  { title: "On My Way",         artist: "Alan Walker",       file: "song/7.mp3", duration: "3:48", emoji: "🛣️" },
];

let songIndex = 0, isPlaying = false, isShuffle = false, isRepeat = false, isMuted = false;
const likedSongs = new Set();
const audio = new Audio();

const $ = id => document.getElementById(id);
const masterPlay  = $('masterPlay');
const bigPlayBtn  = $('bigPlayBtn');
const prevBtn     = $('prevBtn');
const nextBtn     = $('nextBtn');
const progressBar = $('progressBar');
const volumeBar   = $('volumeBar');
const muteBtn     = $('muteBtn');
const shuffleBtnP = $('shuffleBtnP');
const repeatBtnP  = $('repeatBtnP');
const shuffleBtn  = $('shuffleBtn');
const repeatBtn   = $('repeatBtn');
const likeBtn     = $('likeBtn');
const npTitle     = $('npTitle');
const npArtist    = $('npArtist');
const npCover     = $('npCover');
const currentTimeEl = $('currentTime');
const durationEl    = $('duration');
const toast         = $('toast');
const songList      = $('songList');

function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 2000);
}

function renderSongs() {
  songList.innerHTML = songs.map((s, i) => `
    <div class="song-row ${i===songIndex?'active':''} ${i===songIndex&&isPlaying?'playing':''}" data-i="${i}">
      <div class="song-num">
        <span class="num-text">${i+1}</span>
        <div class="eq-bars">
          <div class="eq-bar"></div><div class="eq-bar"></div>
          <div class="eq-bar"></div><div class="eq-bar"></div>
        </div>
        <i class="fas fa-play play-icon"></i>
      </div>
      <div class="song-info-cell">
        <div class="song-cover-placeholder">${s.emoji}</div>
        <div>
          <div class="song-title">${s.title}</div>
          <div class="song-artist">${s.artist}</div>
        </div>
      </div>
      <div class="song-artist" style="font-size:.82rem">${s.artist}</div>
      <div class="song-duration">${s.duration}</div>
    </div>
  `).join('');

  document.querySelectorAll('.song-row').forEach(row => {
    row.addEventListener('click', () => {
      const idx = +row.dataset.i;
      if (idx === songIndex) { togglePlay(); }
      else { songIndex = idx; loadSong(true); }
    });
  });
}

function loadSong(autoplay = false) {
  const s = songs[songIndex];
  audio.src = s.file;
  npTitle.textContent  = s.title;
  npArtist.textContent = s.artist;
  npCover.textContent  = s.emoji;
  likeBtn.innerHTML = likedSongs.has(songIndex)
    ? '<i class="fas fa-heart" style="color:var(--green)"></i>'
    : '<i class="far fa-heart"></i>';
  progressBar.value = 0;
  progressBar.style.setProperty('--prog', '0%');
  currentTimeEl.textContent = '0:00';
  durationEl.textContent = s.duration;
  renderSongs();
  if (autoplay) {
    audio.play()
      .then(() => { isPlaying = true; updatePlayIcons(); renderSongs(); })
      .catch(() => { showToast('⚠️ Add MP3 files to /song/ folder'); isPlaying = false; updatePlayIcons(); });
  }
}

function togglePlay() {
  if (!audio.src || audio.src === location.href) { loadSong(true); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; }
  else { audio.play().catch(() => showToast('⚠️ Audio file not found')); isPlaying = true; }
  updatePlayIcons();
  renderSongs();
}

function updatePlayIcons() {
  const icon = isPlaying ? 'fa-pause' : 'fa-play';
  masterPlay.innerHTML = `<i class="fas ${icon}"></i>`;
  bigPlayBtn.innerHTML = `<i class="fas ${icon}"></i>`;
}

function prevSong() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  songIndex = isShuffle
    ? Math.floor(Math.random() * songs.length)
    : (songIndex - 1 + songs.length) % songs.length;
  loadSong(isPlaying);
}
function nextSong() {
  songIndex = isShuffle
    ? Math.floor(Math.random() * songs.length)
    : (songIndex + 1) % songs.length;
  loadSong(isPlaying);
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressBar.value = pct;
  progressBar.style.setProperty('--prog', pct + '%');
  currentTimeEl.textContent = fmtTime(audio.currentTime);
  durationEl.textContent    = fmtTime(audio.duration);
});

progressBar.addEventListener('input', () => {
  const pct = +progressBar.value;
  progressBar.style.setProperty('--prog', pct + '%');
  if (audio.duration) audio.currentTime = (pct / 100) * audio.duration;
});

volumeBar.addEventListener('input', () => {
  const v = +volumeBar.value;
  audio.volume = v / 100;
  volumeBar.style.setProperty('--vol', v + '%');
  muteBtn.innerHTML = v === 0
    ? '<i class="fas fa-volume-mute"></i>'
    : v < 50 ? '<i class="fas fa-volume-down"></i>'
    : '<i class="fas fa-volume-up"></i>';
});

muteBtn.addEventListener('click', () => {
  isMuted = !isMuted;
  audio.muted = isMuted;
  muteBtn.innerHTML = isMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
  showToast(isMuted ? '🔇 Muted' : '🔊 Unmuted');
});

audio.addEventListener('ended', () => {
  if (isRepeat) { audio.currentTime = 0; audio.play(); }
  else nextSong();
});

function toggleShuffle() {
  isShuffle = !isShuffle;
  [shuffleBtn, shuffleBtnP].forEach(b => b.classList.toggle('active', isShuffle));
  showToast(isShuffle ? '🔀 Shuffle on' : 'Shuffle off');
}
function toggleRepeat() {
  isRepeat = !isRepeat;
  [repeatBtn, repeatBtnP].forEach(b => b.classList.toggle('active', isRepeat));
  showToast(isRepeat ? '🔁 Repeat on' : 'Repeat off');
}

shuffleBtn.addEventListener('click', toggleShuffle);
shuffleBtnP.addEventListener('click', toggleShuffle);
repeatBtn.addEventListener('click', toggleRepeat);
repeatBtnP.addEventListener('click', toggleRepeat);

likeBtn.addEventListener('click', () => {
  if (likedSongs.has(songIndex)) {
    likedSongs.delete(songIndex);
    likeBtn.innerHTML = '<i class="far fa-heart"></i>';
    showToast('Removed from Liked Songs');
  } else {
    likedSongs.add(songIndex);
    likeBtn.innerHTML = '<i class="fas fa-heart" style="color:var(--green)"></i>';
    showToast('❤️ Added to Liked Songs');
  }
});

masterPlay.addEventListener('click', togglePlay);
bigPlayBtn.addEventListener('click', () => {
  if (!isPlaying && (!audio.src || audio.src === location.href)) loadSong(true);
  else togglePlay();
});
prevBtn.addEventListener('click', prevSong);
nextBtn.addEventListener('click', nextSong);

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextSong();
  if (e.code === 'ArrowLeft')  prevSong();
  if (e.code === 'KeyM')       muteBtn.click();
  if (e.code === 'KeyS')       toggleShuffle();
  if (e.code === 'KeyR')       toggleRepeat();
});

audio.volume = 0.7;
volumeBar.style.setProperty('--vol', '70%');
loadSong(false);
</script>
</body>
</html>
